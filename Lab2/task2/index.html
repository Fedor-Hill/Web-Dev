<!DOCTYPE html> 

<head>
    <title>Instagraaam</title>
    <link rel="icon" type="image/x-icon" href="img/logo.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-box"> 
    
        <div class="box flex-item left-card">
            <h1>Посмотрите, какими моментами из жизни поделились ваши близкие друзья </h1>
            <img src="img/phones.png" width="500" height="500">
        </div>

        <hr>
        
        <div class="box flex-item box-login">
            <p>Войдите в Instagraaam</p>
            <input type="text" placeholder="Имя пользователя, номер мобильного телефона или электронный адрес">
            <input type="password" placeholder="Пароль">
            <button class="btn btn-blue">Войти</button>
            <button class="text-btn">Забыли пароль ?</button>
            
            <button class="btn">Забыли через Facebook</button>
            <button class="btn">Создать новый аккаунт</button>
            <br>
            <p style="text-align: center;">Meta</p>
        </div>

    </div>
</body>
